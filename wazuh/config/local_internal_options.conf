# Wazuh Internal Options - Custom Configuration
# Override default values in internal_options.conf

# Agent connection
agent.tolerance=15
agent.state_interval=5s
agent.debug=0

# Buffer sizes
analysisd.default_events_per_second=500
analysisd.max_events_per_second=5000
analysisd.event_queue_size=16384

# Log collector
logcollector.max_lines=10000
logcollector.max_files=1000
logcollector.vcheck_files=64
logcollector.max_log_size=100M
logcollector.force_reload=0
logcollector.reload_interval=64
logcollector.remote_commands=1
logcollector.loop_timeout=2
logcollector.open_attempts=8
logcollector.open_interval=5
logcollector.debug=0

# Active Response
active-response.executing_hooks=1
active-response.cmd_timeout=30
active-response.max_retries=3
active-response.retry_interval=5

# Syscheck
syscheck.sleep=60
syscheck.sleep_after=100
syscheck.max_diff_size=1048576
syscheck.rt_delay=30

# Rootcheck
rootcheck.sleep=50
rootcheck.max_endpoint=200

# Integrator (for n8n webhook)
integrator.enabled=1
integrator.host=0.0.0.0
integrator.port=55001
integrator.debug=0

# API
api.enabled=1
api.port=55000
api.https=yes
api.max_connections=200
api.max_request_size=1048576
api.debug=0
api.cors=1
api.cors_origin=*
api.auth_failed_limit=5
api.auth_failed_ttl=300

# Cluster
cluster.disabled=0
cluster.node_type=master
cluster.bind_addr=0.0.0.0
cluster.port=1516
cluster.nodes=wazuh.manager
cluster.hidden=no
cluster.debug=0

# Auth (for agent registration)
auth.enabled=1
auth.port=1515
auth.ssl_agent_ca=/var/ossec/etc/sslmanager.cert
auth.ssl_verify_host=0
auth.force_insert=1
auth.force_time=0
auth.purge=1
auth.use_password=1
auth.password=CHANGE_ME_REGISTRATION_PASSWORD
auth.limit_maxagents=5000
auth.debug=0

# Log rotation
logrotate.max_size=100M
logrotate.max_files=10
logrotate.compress=1