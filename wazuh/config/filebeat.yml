filebeat.inputs:
- type: log
  enabled: true
  paths:
    - /var/ossec/logs/alerts/alerts.json
  json.keys_under_root: true
  json.add_error_key: true
  json.message_key: full_log
  tags: ["wazuh", "alerts"]
  fields:
    source: wazuh-alerts
  fields_under_root: true

- type: log
  enabled: true
  paths:
    - /var/ossec/logs/archives/archives.log
  json.keys_under_root: true
  json.add_error_key: true
  tags: ["wazuh", "archives"]
  fields:
    source: wazuh-archives
  fields_under_root: true

- type: log
  enabled: true
  paths:
    - /var/ossec/logs/active-responses.log
  tags: ["wazuh", "active-response"]
  fields:
    source: wazuh-active-response
  fields_under_root: true

processors:
- add_host_metadata:
    when.not.contains.tags: forwarded
- add_cloud_metadata: ~
- add_docker_metadata: ~
- add_kubernetes_metadata: ~

output.elasticsearch:
  hosts: ["https://wazuh.indexer:9200"]
  username: "admin"
  password: "${WAZUH_INDEXER_PASSWORD}"
  ssl.verification_mode: "none"
  index: "wazuh-alerts-%{+yyyy.MM.dd}"
  pipeline: "wazuh-alerts"
  bulk_max_size: 1000
  worker: 4
  compression_level: 3

setup.template.enabled: true
setup.template.name: "wazuh"
setup.template.pattern: "wazuh-*"
setup.template.fields: "/usr/share/filebeat/wazuh-template.json"
setup.ilm.enabled: false

logging.level: info
logging.to_files: true
logging.files:
  path: /usr/share/filebeat/logs
  name: filebeat
  keepfiles: 7
  permissions: 0644

monitoring.enabled: true
monitoring.elasticsearch:
  hosts: ["https://wazuh.indexer:9200"]
  username: "admin"
  password: "${WAZUH_INDEXER_PASSWORD}"
  ssl.verification_mode: "none"