<ossec_config>
  <global>
    <json_output>yes</json_output>
    <alerts_log>yes</alerts_log>
    <logall>no</logall>
    <logall_json>no</logall_json>
    <email_notification>yes</email_notification>
    <smtp_server>smtp.yourdomain.com</smtp_server>
    <email_from>wazuh@yourdomain.com</email_from>
    <email_to>security@yourdomain.com</email_to>
    <email_maxperhour>100</email_maxperhour>
  </global>

  <alerts>
    <log_alert_level>1</log_alert_level>
    <email_alert_level>7</email_alert_level>
  </alerts>

  <active_response>
    <command>firewall-drop</command>
    <location>local</location>
    <rules_id>100100, 100101, 100102</rules_id>
    <timeout>600</timeout>
  </active_response>

  <active_response>
    <command>firewall-drop</command>
    <location>local</location>
    <level>10</level>
    <timeout>3600</timeout>
  </active_response>

  <active_response>
    <command>n8n-webhook</command>
    <location>local</location>
    <rules_id>100100, 100101, 100102, 100103, 100104, 100105</rules_id>
    <timeout>0</timeout>
  </active_response>

  <syscheck>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
    <auto_ignore>yes</auto_ignore>
    <alert_new_files>yes</alert_new_files>
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/mail/statistics</ignore>
    <ignore>/etc/random-seed</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/httpd/logs</ignore>
    <ignore>/etc/utmpx</ignore>
    <ignore>/etc/wtmpx</ignore>
    <ignore>/etc/cups/certs</ignore>
    <ignore>/etc/dumpdates</ignore>
    <ignore>/etc/svc/volatile</ignore>
    <ignore>/sys/firmware/acpi/tables</ignore>
    <ignore>/var/spool/cron/lastrun</ignore>
    <ignore>/var/lib/dhcp</ignore>
    <ignore>/var/lib/docker</ignore>
    <ignore>/var/lib/containers</ignore>
    <nohup>yes</nohup>
  </syscheck>

  <rootcheck>
    <frequency>43200</frequency>
    <scan_on_start>yes</scan_on_start>
  </rootcheck>

  <wodle name="open-scap">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="cis-cat">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="aws-s3">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="azure-logs">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="gcp-pubsub">
    <disabled>yes</disabled>
  </wodle>

  <wodle name="osquery">
    <disabled>no</disabled>
    <run_daemon>yes</run_daemon>
    <log_path>/var/ossec/logs/osquery.log</log_path>
    <config_path>/var/ossec/etc/osquery.conf</config_path>
  </wodle>

  <wodle name="docker-listener">
    <interval>10m</interval>
    <attempts>5</attempts>
    <run_on_start>yes</run_on_start>
  </wodle>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/messages</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/secure</location>
  </localfile>

  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/maillog</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/httpd/error_log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/httpd/access_log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/error.log</location>
  </localfile>

  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/nginx/access.log</location>
  </localfile>

  <localfile>
    <log_format>json</log_format>
    <location>/var/log/docker/*/*.log</location>
  </localfile>

  <cluster>
    <name>soar-cluster</name>
    <node_name>wazuh-manager-01</node_name>
    <node_type>master</node_type>
    <key>CHANGE_ME_CLUSTER_KEY_32_CHARS</key>
    <port>1516</port>
    <bind_addr>0.0.0.0</bind_addr>
    <nodes>
      <node>wazuh.manager</node>
    </nodes>
    <hidden>no</hidden>
    <disabled>no</disabled>
  </cluster>
</ossec_config>