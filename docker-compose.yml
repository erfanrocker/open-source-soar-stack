version: '3.8'

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-soar
    restart: unless-stopped
    environment:
      - N8N_SECURE_COOKIE=false
      - WEBHOOK_URL=${N8N_WEBHOOK_URL}
      - GENERIC_TIMEZONE=${TZ}
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - soar-net

  ollama:
    image: ollama/ollama:latest
    container_name: ollama-ai
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - soar-net

  mattermost:
    image: mattermost/mattermost-team-edition:latest
    container_name: mattermost
    restart: unless-stopped
    environment:
      - MM_SQLSETTINGS_DRIVERNAME=postgres
      - MM_SQLSETTINGS_DATASOURCE=postgres://mmuser:${MM_DB_PASSWORD}@postgres:5432/mattermost?sslmode=disable
      - MM_SERVICESETTINGS_SITEURL=${MM_SITE_URL}
    volumes:
      - mattermost_data:/mattermost/data
    networks:
      - soar-net
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: mm-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=mmuser
      - POSTGRES_PASSWORD=${MM_DB_PASSWORD}
      - POSTGRES_DB=mattermost
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - soar-net

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    networks:
      - soar-net
    depends_on:
      - n8n
      - mattermost

volumes:
  n8n_data:
  ollama_data:
  mattermost_data:
  postgres_data:

networks:
  soar-net:
    driver: bridge