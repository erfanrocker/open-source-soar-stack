version: '3.8'

services:
  zammad:
    image: zammad/zammad:latest
    container_name: soar-zammad
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=zammad
      - POSTGRES_USER=zammad
      - POSTGRES_PASSWORD=${ZAMMAD_DB_PASSWORD}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - ZAMMAD_HOST=zammad.yourdomain.com
      - ZAMMAD_PROTOCOL=https
      - ZAMMAD_SESSION_JOB_PERIODIC=300
      - ZAMMAD_RAILS_MASTER_KEY=${ZAMMAD_RAILS_MASTER_KEY}
    volumes:
      - zammad-data:/opt/zammad/storage
      - zammad-backup:/var/backups/zammad
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - soar-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zammad.rule=Host(`zammad.yourdomain.com`)"
      - "traefik.http.routers.zammad.entrypoints=websecure"
      - "traefik.http.routers.zammad.tls.certresolver=letsencrypt"
      - "traefik.http.services.zammad.loadbalancer.server.port=8080"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: soar-zammad-postgres
    environment:
      - POSTGRES_DB=zammad
      - POSTGRES_USER=zammad
      - POSTGRES_PASSWORD=${ZAMMAD_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - soar-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zammad -d zammad"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: soar-zammad-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
      - indices.memory.index_buffer_size=30%
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - soar-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
    restart: unless-stopped
    ulimits:
      memlock:
        soft: -1
        hard: -1

  redis:
    image: redis:7-alpine
    container_name: soar-zammad-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - soar-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  zammad-init:
    image: zammad/zammad:latest
    container_name: soar-zammad-init
    command: ["zammad", "init"]
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_DB=zammad
      - POSTGRES_USER=zammad
      - POSTGRES_PASSWORD=${ZAMMAD_DB_PASSWORD}
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
      - ZAMMAD_HOST=zammad.yourdomain.com
      - ZAMMAD_PROTOCOL=https
      - ZAMMAD_RAILS_MASTER_KEY=${ZAMMAD_RAILS_MASTER_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    networks:
      - soar-net
    restart: "no"

volumes:
  zammad-data:
  zammad-backup:
  postgres-data:
  elasticsearch-data:
  redis-data:

networks:
  soar-net:
    external: true